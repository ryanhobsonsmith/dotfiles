# vim:set ft=tmux:
# Memory module variables (used by manual status-right build in tmux.conf)
# macOS: shows memory pressure; Linux: shows RAM usage %
# Color thresholds: @mem_medium_thresh (default 30), @mem_high_thresh (default 80)
set -gq @catppuccin_mem_icon " "
set -gqF @catppuccin_mem_color "#{E:@thm_blue}"
