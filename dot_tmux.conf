# Catppuccin theme
set -g @catppuccin_flavor 'mocha'
set -g @plugin 'catppuccin/tmux#v2.1.3'

# plugins
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# window management 
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set-option -g allow-rename off 
set -g mouse on
bind < swap-window -t -1 \; prev
bind > swap-window -t +1 \; next

# Don't prompt to kill pane/window
bind x kill-pane
unbind &
bind X kill-window

bind-key -n S-Enter send-keys Escape "[13;2u"
set -g extended-keys always
set -as terminal-features 'tmux-256color:extkeys'

bind a last-window       # jump back to previous window
bind Tab switch-client -l  # jump back to previous session

# Session color picker (Prefix + F1-F5)
bind M-1 set status-style "bg=#89b4fa,fg=#1e1e2e" # blue
bind M-2 set status-style "bg=#a6e3a1,fg=#1e1e2e" # green
bind M-3 set status-style "bg=#f38ba8,fg=#1e1e2e" # red
bind M-4 set status-style "bg=#f9e2af,fg=#1e1e2e" # yellow
bind M-5 set status-style "bg=#cba6f7,fg=#1e1e2e" # purple

# remap prefix 
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix
bind C-k send-keys "clear" Enter \; clear-history

# split panes using | and -
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

# vim motion and copy bindings
set -g mode-keys vi
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind Enter copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel


bind c new-window -c "#{pane_current_path}"
bind C command-prompt "new-window -n '%%'"


# Colors
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-ghostty:RGB"

bind r source-file ~/.tmux.conf \; display "Config reloaded!"




# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
