# Catppuccin theme
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style "rounded"
# Widen active/inactive window pill contrast (overrides catppuccin defaults)
set -g @catppuccin_window_number_color "#{@thm_overlay_0}"
set -g @catppuccin_window_text_color "#{@thm_mantle}"
set -g @catppuccin_window_current_text_color "#{@thm_surface_2}"
set -g @plugin 'catppuccin/tmux#v2.1.3'

# Status line
set -g status-position top
bind b if-shell '[ "$(tmux show -gv @focused)" = "1" ]' \
  'set -g @focused 0 ; source-file ~/.tmux.conf' \
  'set -g @focused 1 ; set -g status-format[0] "#{E:@_window_format}" ; set -g status on'

# plugins
bind o display-popup -w 80% -h 70% -E "~/.tmux/scripts/sessionizer.sh"
bind Space display-popup -w 60 -h 14 -E "~/.tmux/scripts/layout-picker.sh"
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'off'
if-shell '[ "$(uname)" = "Linux" ]' 'set -g @plugin "jkhas8/tmux-paste-image"'

# window management 
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set-option -g allow-rename off 
set -g mouse on
set -g detach-on-destroy off
bind < swap-window -t -1 \; prev
bind > swap-window -t +1 \; next
bind -n M-, previous-window
bind -n M-. next-window
bind -n C-, previous-window
bind -n C-. next-window
bind -n M-[ switch-client -p
bind -n M-] switch-client -n

# Don't prompt to kill pane/window
bind x kill-pane
unbind &
bind X kill-window
bind Q run-shell 'tmux kill-session -t "#S"; tmux list-sessions >/dev/null 2>&1 && ~/.tmux/plugins/tmux-resurrect/scripts/save.sh 2>/dev/null || rm -f ~/.tmux/resurrect/last'

bind-key -n S-Enter send-keys Escape "[13;2u"
set -g extended-keys on
set -g extended-keys-format csi-u
bind -n C-Tab next-window
set -as terminal-features 'tmux-256color:extkeys'

# TODO popup
bind t display-popup -w 80% -h 80% -E "$EDITOR ~/TODO.md"

bind a last-window       # jump back to previous window
bind A switch-client -l  # jump back to previous session

# Alt+number to switch windows
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# remap prefix 
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix
bind C-k send-keys "clear" Enter \; clear-history
bind v display "→ code #{session_path}" \; run-shell 'code "#{session_path}"'

# split panes using | and -
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

# vim motion and copy bindings
set -g mode-keys vi
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Unified nav with Neovim via smart-splits.nvim: Ctrl+hjkl crosses freely
# between nvim windows and tmux panes. If the focused pane is running
# nvim/vim, forward the key to it; otherwise, run tmux select-pane.
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'
# Same bindings in copy mode so nav still works while scrolling back
bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R

bind Enter copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel


bind , command-prompt -I "" -p "rename:" "rename-window '%%'"
bind c new-window -c "#{pane_current_path}"
bind C command-prompt "new-window -n '%%'"


# Terminal and colors
set -g default-terminal "tmux-256color"
set -sa terminal-features ",xterm-ghostty:RGB:extkeys"
set -sa terminal-features ",xterm-256color:RGB"
# "all" not "on" — both allow DCS passthrough (cursor shape, Claude Code
# notifications) but "all" scopes sequences per-pane. With "on", opencode
# leaks escape sequences into other tmux windows causing garbled text and
# unexpected tab switches. See: github.com/anomalyco/opencode/issues/15744
set -g allow-passthrough on
set -sg escape-time 0
set -g focus-events on
set -g set-clipboard on
set -g history-limit 250000

bind r source-file ~/.tmux.conf \; display "Config reloaded!"




# Window status: show window name + claude status icon
# Claude status icon refresh rate = status-interval (default 15s)
# set -g status-interval 5  # uncomment for faster updates
set -g @catppuccin_window_text " #{?#{==:#{@claude_state},working},#[fg=#fab387]󰚩#[fg=#{@thm_fg}] ,#{?#{==:#{@claude_state},done},#[fg=#a6e3a1]󰚩#[fg=#{@thm_fg}] ,#{?#{==:#{@claude_state},waiting},#[fg=#f38ba8]󰚩#[fg=#{@thm_fg}] ,#{?#{==:#{@claude_state},idle},#[fg=#6c7086]󰚩#[fg=#{@thm_fg}] ,}}}}#W#{?window_zoomed_flag, 󰍉,}#{?window_last_flag, 󰁯,}"
set -g @catppuccin_window_current_text " #{?#{==:#{@claude_state},working},#[fg=#fab387]󰚩#[fg=#{@thm_fg}] ,#{?#{==:#{@claude_state},done},#[fg=#a6e3a1]󰚩#[fg=#{@thm_fg}] ,#{?#{==:#{@claude_state},waiting},#[fg=#f38ba8]󰚩#[fg=#{@thm_fg}] ,#{?#{==:#{@claude_state},idle},#[fg=#6c7086]󰚩#[fg=#{@thm_fg}] ,}}}}#W#{?window_zoomed_flag, 󰍉,}"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

# Status modules (must be after TPM so catppuccin variables are defined)
source "~/.tmux/scripts/catppuccin-mem.conf"
source "~/.tmux/scripts/catppuccin-prefix.conf"
# Detect remote environment (SSH or Docker) — override the prefix pill icon+color
# Default (local) is set in catppuccin-prefix.conf: 󰲝 grey
# Initial detection at config load time
if-shell '[ -f /.dockerenv ]' 'source ~/.tmux/scripts/catppuccin-prefix-docker.conf' \
  'if-shell "tmux show-environment SSH_CONNECTION 2>/dev/null | grep -qv ^-" "source ~/.tmux/scripts/catppuccin-prefix-ssh.conf"'
set -g status-right-length 100
set -g status-left-length 100
set -g status-left "#{?#{==:#{@focused},1},#{E:@catppuccin_status_session},}"
set -gF status-right "#{E:@catppuccin_status_cpu}"
# Re-run tmux-cpu after status-right is set (it interpolates #{cpu_percentage} in place)
run '~/.tmux/plugins/tmux-cpu/cpu.tmux'
# Memory module: single #() outputs the full icon+text pill with dynamic icon color
# (script outputs #[fg=...,bg=...] directives directly — avoids hex-in-#[] parsing bug)
set -ag status-right "#(~/.tmux/scripts/memory-status.sh)#{@catppuccin_status_right_separator}"
set -ag status-right "#{E:@catppuccin_status_directory}"

# Two-line status: sessions on top, windows below
set -g status 2
set -g @focused 0
# Store window format so the toggle can swap it into format[0] for focused mode
set -g @_window_format "#[align=left range=left #{E:status-left-style}]#[push-default]#{T;=/#{status-left-length}:status-left}#[pop-default]#[norange default]#[list=on align=#{status-justify}]#[list=left-marker]<#[list=right-marker]>#[list=on]#{W:#[range=window|#{window_index} #{E:window-status-style}#{?#{&&:#{window_last_flag},#{!=:#{E:window-status-last-style},default}}, #{E:window-status-last-style},}#{?#{&&:#{window_bell_flag},#{!=:#{E:window-status-bell-style},default}}, #{E:window-status-bell-style},#{?#{&&:#{||:#{window_activity_flag},#{window_silence_flag}},#{!=:#{E:window-status-activity-style},default}}, #{E:window-status-activity-style},}}]#[push-default]#{T:window-status-format}#[pop-default]#[norange default]#{?loop_last_flag,,#{window-status-separator}},#[range=window|#{window_index} list=focus #{?#{!=:#{E:window-status-current-style},default},#{E:window-status-current-style},#{E:window-status-style}}#{?#{&&:#{window_last_flag},#{!=:#{E:window-status-last-style},default}}, #{E:window-status-last-style},}#{?#{&&:#{window_bell_flag},#{!=:#{E:window-status-bell-style},default}}, #{E:window-status-bell-style},#{?#{&&:#{||:#{window_activity_flag},#{window_silence_flag}},#{!=:#{E:window-status-activity-style},default}}, #{E:window-status-activity-style},}}]#[push-default]#{T:window-status-current-format}#[pop-default]#[norange list=on default]#{?loop_last_flag,,#{window-status-separator}}}#[nolist align=right range=right #{E:status-right-style}]#[push-default]#{T;=/#{status-right-length}:status-right}#[pop-default]#[norange default]"
set -g status-format[0] "#[align=left bg=#181825]#{E:@catppuccin_status_prefix}#{E:@session_bar}"
set -g status-format[1] "#{E:@_window_format}"
# Rebuild session bar on session lifecycle events and session switch
set-hook -g session-created 'run-shell -b "~/.tmux/scripts/session-list.sh >/dev/null 2>&1 && tmux refresh-client -S"'
set-hook -g session-closed 'run-shell -b "tmux list-sessions >/dev/null 2>&1 && { ~/.tmux/scripts/session-list.sh >/dev/null 2>&1; tmux refresh-client -S; } || true"'
set-hook -g session-renamed 'run-shell -b "~/.tmux/scripts/session-list.sh >/dev/null 2>&1 && tmux refresh-client -S"'
set-hook -g client-session-changed 'run-shell -b "~/.tmux/scripts/session-list.sh >/dev/null 2>&1 && tmux refresh-client -S"'
# Detect SSH/Docker on client lifecycle events and update prefix pill
set-hook -g client-attached 'run-shell -b "~/.tmux/scripts/detect-remote.sh; tmux refresh-client -S"'
set-hook -g client-detached 'run-shell -b "~/.tmux/scripts/detect-remote.sh"'
set-hook -g client-active 'run-shell -b "~/.tmux/scripts/detect-remote.sh; tmux refresh-client -S"'
# Mark claude "done" as "idle" when viewing a window
set-hook -g after-select-window 'run-shell -b "~/.tmux/scripts/claude-tmux-viewed.sh"'

# Double pane borders with Catppuccin colors
set -g pane-border-lines double
set -g pane-border-style 'fg=#313244'
set -g pane-active-border-style 'fg=#89b4fa'

# Override theme for inactive pane dimming (must be after TPM)
# set -g window-style 'bg=#181825,fg=#6c7086'
# set -g window-active-style 'bg=#1e1e2e,fg=#cdd6f4'
