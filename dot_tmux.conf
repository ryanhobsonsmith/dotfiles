# Catppuccin theme
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style 'rounded'
set -g @catppuccin_window_text '#W'
set -g @catppuccin_window_current_text '#W'
set -g @plugin 'catppuccin/tmux#v2.1.3'

# Status line
set -g status-position top
set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_application}"
set -agF status-right "#{E:@catppuccin_status_cpu}"
set -ag status-right "#{E:@catppuccin_status_session}"
set -ag status-right "#{E:@catppuccin_status_uptime}"
set -agF status-right "#{E:@catppuccin_status_battery}"

# plugins
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-battery'

# window management 
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set-option -g allow-rename off 
set -g mouse on
bind < swap-window -t -1 \; prev
bind > swap-window -t +1 \; next

# Don't prompt to kill pane/window
bind x kill-pane
unbind &
bind X kill-window

bind-key -n S-Enter send-keys Escape "[13;2u"
set -g extended-keys always
set -as terminal-features 'tmux-256color:extkeys'

bind a last-window       # jump back to previous window
bind Tab switch-client -l  # jump back to previous session

# Alt+number to switch windows
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# Alt+hjkl to switch panes
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# remap prefix 
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix
bind C-k send-keys "clear" Enter \; clear-history

# split panes using | and -
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

# vim motion and copy bindings
set -g mode-keys vi
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind Enter copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel


bind c new-window -c "#{pane_current_path}"
bind C command-prompt "new-window -n '%%'"


# Pane borders
set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#89b4fa,bold"
set -g pane-border-lines heavy

# Terminal and colors
set -g default-terminal "tmux-256color"
set -sa terminal-features ",xterm-ghostty:RGB"
set -g allow-passthrough on
set -sg escape-time 0
set -g focus-events on
set -g set-clipboard on
set -g history-limit 250000

bind r source-file ~/.tmux.conf \; display "Config reloaded!"




# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
