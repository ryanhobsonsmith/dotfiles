# vim:set ft=tmux:
# Custom catppuccin rounded pill for prefix/sessions indicator
# Icon section: green (#B3E1A7) default, pink (#E590A8) when prefix active
# Text section: always #9499B0 bg with md-tab icon

set -gq @catppuccin_status_prefix \
  "#[fg=#{?client_prefix,#E590A8,#B3E1A7}]#[fg=#11111A,bg=#{?client_prefix,#E590A8,#B3E1A7}]󰌌 #[fg=#{E:@thm_crust},bg=#9499B0] 󰲝 #[fg=#9499B0,bg=default]#[default] "
