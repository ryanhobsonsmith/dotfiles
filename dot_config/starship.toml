# Minimal starship config — Tokyo Night inspired

format = """$hostname${custom.container}$directory$git_branch$git_status$cmd_duration$line_break$character"""

[hostname]
ssh_only = true
format = '[$ssh_symbol$hostname]($style) '
style = 'bold yellow'
ssh_symbol = ' '

[custom.container]
when = '[ -f /.dockerenv ] || [ -n "$container" ]'
symbol = '󰡨 '
format = '[$symbol]($style)'
style = 'bold cyan'

[character]
success_symbol = '[❯](bold green)'
error_symbol = '[❯](bold red)'
vicmd_symbol = '[❮](bold green)'

[directory]
truncation_length = 3
style = 'bold blue'

[git_branch]
format = '[$branch]($style) '
style = 'bold magenta'

[git_status]
format = '([$all_status$ahead_behind]($style) )'
style = 'bold red'

[cmd_duration]
min_time = 2000
format = '[$duration]($style) '
style = 'bold yellow'
