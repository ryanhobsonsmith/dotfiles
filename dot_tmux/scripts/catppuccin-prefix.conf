# vim:set ft=tmux:
# Custom catppuccin rounded pill for prefix + environment indicator
# Left section: keyboard icon — green (#B3E1A7) default, pink (#E590A8) when prefix active
# Right section: environment icon — grey (#9499B0) for local, peach (#fab387) for SSH/Docker
# Default: local machine (grey computer icon)
#
# WARNING: This file contains powerline glyphs (U+E0B4, U+E0B6) and nerd font icons
# that get silently stripped by text editor tools. Edit with printf + hex escapes:
#   left roundcap  = \xee\x82\xb6   right roundcap  = \xee\x82\xb4
#   keyboard       = \xef\x84\x9c   computer       = \xf3\xb0\xb2\x9d
#   globe          = \xf3\xb0\x96\x9f   docker         = \xef\x88\x9f

set -gq @catppuccin_status_prefix \
  "#[fg=#{?client_prefix,#E590A8,#B3E1A7}]#[fg=#11111A,bg=#{?client_prefix,#E590A8,#B3E1A7}]  #[fg=#{E:@thm_crust},bg=#9499B0] 󰲝 #[fg=#9499B0,bg=default]#[default] "
