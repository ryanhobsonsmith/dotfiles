# vim:set ft=tmux:
# Custom catppuccin rounded pill for prefix indicator
# Peach when prefix active, matches inactive window pill bg when inactive

set -gq @catppuccin_status_prefix \
  "#[fg=#{?client_prefix,#{E:@thm_peach},#{E:@thm_surface_0}}]#[fg=#{?client_prefix,#{E:@thm_crust},#{E:@thm_overlay_1}},bg=#{?client_prefix,#{E:@thm_peach},#{E:@thm_surface_0}}]󰌌#[fg=#{?client_prefix,#{E:@thm_peach},#{E:@thm_surface_0}},bg=default]#[default] "
