# Catppuccin theme
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style "rounded"
set -g @plugin 'catppuccin/tmux#v2.1.3'

# Status line
set -g status-position top
bind b if-shell '[ "$(tmux show -gv status-right)" = "" ]' \
  'source-file ~/.tmux.conf' \
  'set -g status-right ""'

# plugins
unbind o
set -g @sessionx-bind 'o'
set -g @plugin 'omerxx/tmux-sessionx'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'

# window management 
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set-option -g allow-rename off 
set -g mouse on
bind < swap-window -t -1 \; prev
bind > swap-window -t +1 \; next
bind -n M-, previous-window
bind -n M-. next-window
bind -n C-, previous-window
bind -n C-. next-window

# Don't prompt to kill pane/window
bind x kill-pane
unbind &
bind X kill-window
bind Q run-shell 'tmux switch-client -l && tmux kill-session -t "#S"'

bind-key -n S-Enter send-keys Escape "[13;2u"
set -g extended-keys on
set -g extended-keys-format csi-u
bind -n C-Tab next-window
set -as terminal-features 'tmux-256color:extkeys'

# Floating terminal popup (toggle)
bind t if-shell -F '#{==:#{session_name},floating}' { detach-client } \
  { display-popup -w 80% -h 80% -d '#{pane_current_path}' -E 'tmux new-session -A -s floating' }

bind a last-window       # jump back to previous window
bind A switch-client -l  # jump back to previous session

# Alt+number to switch windows
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# Alt+hjkl to switch panes
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# remap prefix 
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix
bind C-k send-keys "clear" Enter \; clear-history
bind v display "→ code #{session_path}" \; run-shell 'code "#{session_path}"'

# split panes using | and -
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

# vim motion and copy bindings
set -g mode-keys vi
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind Enter copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel


bind c new-window -c "#{pane_current_path}"
bind C command-prompt "new-window -n '%%'"


# Terminal and colors
set -g default-terminal "tmux-256color"
set -sa terminal-features ",xterm-ghostty:RGB:extkeys"
set -g allow-passthrough on
set -sg escape-time 0
set -g focus-events on
set -g set-clipboard on
set -g history-limit 250000

bind r source-file ~/.tmux.conf \; display "Config reloaded!"




# Window status: show window name instead of pane title
set -g @catppuccin_window_text " #W#{?window_last_flag, 󰁯,}"
set -g @catppuccin_window_current_text " #W"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

# Status modules (must be after TPM so catppuccin variables are defined)
set -g status-right-length 100
set -g status-left-length 100
set -g status-left "#{E:@catppuccin_status_session}"
set -ag status-left "#{E:@catppuccin_status_prefix}"
set -g status-right "#{E:@catppuccin_status_directory}"

# Two-line status: sessions on top, windows below
set -g status 2
# Swap: sessions go to format[0] (top line), default window list goes to format[1]
set -g status-format[0] "#[align=left,bg=#181825]#{S:#{?session_attached,#[fg=#b4befe],#[fg=#6c7086]} #S }"
set -g status-format[1] "#[align=left range=left #{E:status-left-style}]#[push-default]#{T;=/#{status-left-length}:status-left}#[pop-default]#[norange default]#[list=on align=#{status-justify}]#[list=left-marker]<#[list=right-marker]>#[list=on]#{W:#[range=window|#{window_index} #{E:window-status-style}#{?#{&&:#{window_last_flag},#{!=:#{E:window-status-last-style},default}}, #{E:window-status-last-style},}#{?#{&&:#{window_bell_flag},#{!=:#{E:window-status-bell-style},default}}, #{E:window-status-bell-style},#{?#{&&:#{||:#{window_activity_flag},#{window_silence_flag}},#{!=:#{E:window-status-activity-style},default}}, #{E:window-status-activity-style},}}]#[push-default]#{T:window-status-format}#[pop-default]#[norange default]#{?loop_last_flag,,#{window-status-separator}},#[range=window|#{window_index} list=focus #{?#{!=:#{E:window-status-current-style},default},#{E:window-status-current-style},#{E:window-status-style}}#{?#{&&:#{window_last_flag},#{!=:#{E:window-status-last-style},default}}, #{E:window-status-last-style},}#{?#{&&:#{window_bell_flag},#{!=:#{E:window-status-bell-style},default}}, #{E:window-status-bell-style},#{?#{&&:#{||:#{window_activity_flag},#{window_silence_flag}},#{!=:#{E:window-status-activity-style},default}}, #{E:window-status-activity-style},}}]#[push-default]#{T:window-status-current-format}#[pop-default]#[norange list=on default]#{?loop_last_flag,,#{window-status-separator}}}#[nolist align=right range=right #{E:status-right-style}]#[push-default]#{T;=/#{status-right-length}:status-right}#[pop-default]#[norange default]"
# Refresh status immediately on session changes
set-hook -g client-session-changed 'refresh-client -S'

# Override theme for inactive pane dimming (must be after TPM)
set -g window-style 'bg=#181825,fg=#6c7086'
set -g window-active-style 'bg=#1e1e2e,fg=#cdd6f4'
